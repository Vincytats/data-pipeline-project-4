name: Data Pipelines

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipelines:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pandas

      - name: Run Monthly Stats Pipeline
        run: python scripts/pipeline.py

      - name: Run Participant Pipeline
        run: python scripts/pipeline_participants.py

      - name: Commit updated datasets
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add processed_monthly_stats.csv
          git add processed_participant_data.csv
          git commit -m "Auto-update datasets" || echo "No changes"
          git push
