name: Participant Pipeline

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pandas

      - name: Run pipeline
        run: python scripts/pipeline_participants.py

      # 🔍 DEBUG (VERY IMPORTANT)
      - name: Check files
        run: ls -R

      # ✅ FIXED STEP
      - name: Commit dataset
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add processed_participant_data.csv
          git commit -m "Auto-update participant dataset" || echo "No changes"
          git push
